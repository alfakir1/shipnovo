<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360" fill="none">
  <!-- BG globe -->
  <circle cx="360" cy="180" r="140" fill="#060F39" opacity="0.06"/>
  <circle cx="360" cy="180" r="100" fill="#060F39" opacity="0.06"/>

  <!-- Latitude/longitude lines -->
  <ellipse cx="360" cy="180" rx="100" ry="30" stroke="#34558C" stroke-width="1" opacity="0.3" fill="none"/>
  <ellipse cx="360" cy="180" rx="100" ry="60" stroke="#34558C" stroke-width="1" opacity="0.2" fill="none"/>
  <line x1="360" y1="80" x2="360" y2="280" stroke="#34558C" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="180" x2="460" y2="180" stroke="#34558C" stroke-width="1" opacity="0.25"/>

  <!-- Route dots on globe -->
  <circle cx="310" cy="155" r="5" fill="#EE7011"/>
  <circle cx="380" cy="170" r="4" fill="#FEA012"/>
  <circle cx="420" cy="145" r="4" fill="#34558C"/>
  <path d="M315 152 Q350 130 376 167" stroke="#EE7011" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.8"/>
  <path d="M384 168 Q402 155 416 147" stroke="#FEA012" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.7"/>

  <!-- Main card (left side) -->
  <rect x="40" y="70" width="270" height="230" rx="16" fill="#FFFFFF" stroke="#CFD0D3" stroke-width="1.5"/>
  
  <!-- Card header navy -->
  <rect x="40" y="70" width="270" height="70" rx="16" fill="#060F39"/>
  <rect x="40" y="105" width="270" height="35" fill="#060F39"/>

  <!-- Avatar on card -->
  <circle cx="90" cy="105" r="28" fill="#34558C"/>
  <circle cx="90" cy="97" r="13" fill="#FFFFFF" opacity="0.25"/>
  <ellipse cx="90" cy="122" rx="18" ry="9" fill="#FFFFFF" opacity="0.25"/>

  <!-- Card text lines -->
  <rect x="130" y="88" width="110" height="10" rx="5" fill="#FFFFFF" opacity="0.85"/>
  <rect x="130" y="103" width="75" height="7" rx="3.5" fill="#6989C2" opacity="0.7"/>

  <!-- Orange tag -->
  <rect x="256" y="85" width="42" height="20" rx="6" fill="#EE7011"/>
  <rect x="261" y="91" width="32" height="8" rx="3" fill="#FFFFFF" opacity="0.4"/>

  <!-- Form fields -->
  <rect x="58" y="158" width="234" height="36" rx="8" fill="#F7F8FA" stroke="#CFD0D3" stroke-width="1"/>
  <rect x="68" y="170" width="80" height="8" rx="4" fill="#A8BEDE"/>

  <rect x="58" y="202" width="110" height="36" rx="8" fill="#F7F8FA" stroke="#CFD0D3" stroke-width="1"/>
  <rect x="68" y="214" width="60" height="8" rx="4" fill="#A8BEDE"/>

  <rect x="178" y="202" width="114" height="36" rx="8" fill="#F7F8FA" stroke="#CFD0D3" stroke-width="1"/>
  <rect x="188" y="214" width="70" height="8" rx="4" fill="#A8BEDE"/>

  <!-- CTA button -->
  <rect x="58" y="250" width="234" height="38" rx="9" fill="#EE7011"/>
  <rect x="148" y="263" width="104" height="12" rx="6" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="130" cy="269" r="8" fill="#FFFFFF" opacity="0.25"/>

  <!-- Ship icon on button -->
  <path d="M122 273 L126 265 L138 265 L138 273 Z" fill="#FFFFFF" opacity="0.5"/>
  <path d="M118 273 L142 273 L140 278 L120 278 Z" fill="#FFFFFF" opacity="0.5"/>
</svg>
