<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Shadow -->
  <ellipse cx="200" cy="255" rx="120" ry="14" fill="#E8EEF7"/>

  <!-- Ticket body -->
  <rect x="70" y="80" width="260" height="150" rx="12" fill="#060F39"/>
  <rect x="70" y="80" width="260" height="50" rx="12" fill="#081641"/>
  <rect x="70" y="105" width="260" height="25" fill="#081641"/>

  <!-- Perforation line -->
  <line x1="70" y1="165" x2="330" y2="165" stroke="#122454" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="70" cy="165" r="8" fill="#F7F8FA"/>
  <circle cx="330" cy="165" r="8" fill="#F7F8FA"/>

  <!-- Ticket top content -->
  <rect x="92" y="92" width="80" height="8" rx="4" fill="#FEA012" opacity="0.8"/>
  <rect x="92" y="105" width="120" height="6" rx="3" fill="#6989C2" opacity="0.7"/>
  <rect x="92" y="116" width="80" height="6" rx="3" fill="#6989C2" opacity="0.4"/>

  <!-- Tag/badge -->
  <rect x="248" y="88" width="64" height="22" rx="6" fill="#EE7011"/>
  <rect x="255" y="94" width="50" height="10" rx="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- Barcode lines -->
  <g opacity="0.6">
    <rect x="92" y="175" width="3" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="98" y="175" width="6" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="108" y="175" width="2" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="113" y="175" width="5" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="121" y="175" width="3" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="127" y="175" width="7" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="137" y="175" width="2" height="28" rx="1" fill="#A8BEDE"/>
    <rect x="142" y="175" width="5" height="28" rx="1" fill="#A8BEDE"/>
  </g>

  <!-- Empty circle -->
  <circle cx="270" cy="200" r="30" fill="#E8EEF7"/>
  <path d="M258 200 L266 208 L283 192" stroke="#A8BEDE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Floating small tickets -->
  <rect x="30" y="110" width="30" height="20" rx="4" fill="#34558C" opacity="0.4" transform="rotate(-15 45 120)"/>
  <rect x="340" y="130" width="26" height="18" rx="4" fill="#FEA012" opacity="0.4" transform="rotate(12 353 139)"/>
</svg>
